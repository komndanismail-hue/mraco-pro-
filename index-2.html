* { box-sizing: border-box; margin: 0; }
body { min-height: 100vh; background: #F2F6F4; color: #14231E; font-family: 'IBM Plex Sans Arabic', sans-serif; padding-bottom: 40px; }
.hdr { background: linear-gradient(160deg, #0B6650, #0E7A5F); color: #fff; padding: 20px 18px 16px; position: relative; overflow: hidden; }

.logo { display:flex; align-items:center; gap:10px; }

.logo h1 { font-family:'Readex Pro'; font-size:24px; font-weight:700; }
.logo h1 span { font-size:13px; background:#fff; color:#0E7A5F; border-radius:7px; padding:2px 8px; margin-right:7px; vertical-align:middle; }
.logo p { font-size:12px; opacity:.85; margin-top:2px; }
.adm-link { position:absolute; top:14px; left:14px; background:rgba(255,255,255,.15); border:0; color:#fff; border-radius:9px; padding:6px 11px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; z-index:3; }
.tabs { display:flex; gap:6px; background:#fff; margin:-14px 16px 0; border-radius:14px; padding:5px; box-shadow:0 4px 16px rgba(11,102,80,.14); position:relative; z-index:2; }
.tabs button { flex:1; border:0; background:transparent; padding:11px 6px; border-radius:10px; font-family:inherit; font-size:14px; font-weight:700; color:#5C6E67; cursor:pointer; }
.tabs button.on { background:#0E7A5F; color:#fff; }
.wrap { padding: 18px 16px 0; max-width: 560px; margin: 0 auto; }
.card { background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow: 0 1px 4px rgba(20,35,30,.06); }
label { display:block; font-size:13px; font-weight:700; color:#3C4F48; margin-bottom:6px; }
input, select, textarea { width:100%; padding:12px 13px; border:1.5px solid #D6E2DD; border-radius:11px; font-family:inherit; font-size:15px; background:#FBFDFC; color:#14231E; margin-bottom:12px; }
input:focus, select:focus, textarea:focus { outline:none; border-color:#0E7A5F; }
.drugrow { display:flex; gap:8px; }
.drugrow input { flex:1; }
.camb { width:52px; height:49px; border:1.5px dashed #0E7A5F; border-radius:11px; background:#F7FBF9; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ph { display:flex; align-items:center; gap:10px; padding:13px 14px; border:1.5px solid #E2EBE7; border-radius:13px; margin-bottom:9px; background:#fff; cursor:pointer; }
.ph.sel { border-color:#0E7A5F; background:#F0F8F5; box-shadow:0 0 0 1px #0E7A5F; }
.ph .info { flex:1; min-width:0; }
.ph .nm { font-weight:700; font-size:15px; }
.ph .ar { font-size:12.5px; color:#67796F; margin-top:2px; }
.dist { font-family:'Readex Pro'; font-weight:700; font-size:13.5px; color:#0E7A5F; background:#E3F3EC; padding:5px 9px; border-radius:9px; white-space:nowrap; }
.ico { display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px; text-decoration:none; flex-shrink:0; font-size:17px; }
.wa { background:#25D366; } .mp { background:#E6F0FB; }
.btn { width:100%; padding:14px; border:0; border-radius:13px; background:#0E7A5F; color:#fff; font-family:'Readex Pro'; font-size:16px; font-weight:700; cursor:pointer; margin-top:4px; }
.btn:disabled { background:#B9CCC5; cursor:not-allowed; }
.btn.blue { background:#1D5FA8; }
.more { width:100%; padding:11px; border:1.5px dashed #0E7A5F; border-radius:11px; background:transparent; color:#0E7A5F; font-family:inherit; font-weight:700; font-size:13.5px; cursor:pointer; margin-top:2px; }
.hint { font-size:12.5px; color:#67796F; text-align:center; margin:8px 0 4px; }

.photo-row { display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; }

.thumb.big { width:110px; height:110px; margin-top:8px; display:block; }

.chk { display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:700; color:#3C4F48; margin-bottom:4px; cursor:pointer; }
.chk input { width:auto; margin:0; accent-color:#0E7A5F; }
.badge.rx { background:#EFE9FB; color:#5B3FA8; margin-top:6px; }

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s || "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const today = () => new Date().toISOString().slice(0, 10);
const nowTime = () => new Date().toLocaleTimeString("ar-SD", { hour: "2-digit", minute: "2-digit" });
function distKm(a, b) {
  const R = 6371, dLat = (b.lat - a.lat) * Math.PI / 180, dLng = (b.lng - a.lng) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}
const OLC_A = "23456789CFGHJMPQRVWX";
function olcEncode(lat, lng, len = 10) {
  let la = lat + 90, lo = lng + 180, code = "", res = 20;
  for (let i = 0; i < len/2; i++) { code += OLC_A[Math.floor(la/res)] + OLC_A[Math.floor(lo/res)]; la %= res; lo %= res; res /= 20; }
  return code;
}
function olcDecode(code) {
  code = code.toUpperCase().replace("+", "");
  let lat = -90, lng = -180, res = 20;
  for (let i = 0; i + 1 < Math.min(code.length, 10); i += 2) { lat += OLC_A.indexOf(code[i]) * res; lng += OLC_A.indexOf(code[i+1]) * res; res /= 20; }
  res *= 20;
  if (code.length > 10) { const g = OLC_A.indexOf(code[10]); lat += Math.floor(g/4) * (res/5); lng += (g%4) * (res/4); return { lat: lat + res/10, lng: lng + res/8 }; }
  return { lat: lat + res/2, lng: lng + res/2 };
}
function parseLocation(text) {
  text = (text || "").trim();
  const m = text.match(/(-?\d{1,2}\.\d+)[,\s]+(-?\d{1,3}\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  const pm = text.match(/([23456789CFGHJMPQRVWX]{2,8}\+[23456789CFGHJMPQRVWX]{2,3})/i);
  if (pm) {
    let code = pm[1].toUpperCase();
    const before = code.split("+")[0];
    if (before.length < 8) code = olcEncode(15.58, 32.53, 10).slice(0, 8 - before.length) + code;
    return olcDecode(code);
  }
  return null;
}

function listenClientRequests() {
  if (unsubClient || !profile) return;
  unsubClient = db.collection("requests").where("clientPhone", "==", profile.phone)
    .onSnapshot((snap) => {
      myRequests = snap.docs.map((d) => ({ rid: d.id, ...d.data() }))
        .sort((a, b) => (b.created?.seconds || 0) - (a.created?.seconds || 0)).slice(0, 15);
      const el = $("myreqs");
      if (!el) return;
      el.innerHTML = myRequests.length === 0 ? "" : `
        <div class="card"><h2>طلباتي</h2>
        ${myRequests.map((r) => {
          const p = ALL.find((x) => x.id === r.pharmacyId), s = STATUS[r.status] || STATUS.pending;
          return `<div class="card req" style="margin-bottom:9px">
            <div class="top"><div><div class="drug">${esc(r.drug)} ${r.photo ? "📎" : ""}</div>

        }).join("")}</div>`;

}

function registerClient() {
  const n = $("rn").value.trim(), p = $("rp").value.trim();
  if (!n || p.length < 9) { alert("أكمل الاسم ورقم الهاتف"); return; }

  store.set("mraco-profile", profile);
  render();

function clearLoc() { customLoc = null; render(); }
function useGPS() {
  if (!navigator.geolocation) { alert("جهازك لا يدعم تحديد الموقع"); return; }
  $("gpsbtn").textContent = "⏳ جارٍ تحديد موقعك...";
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const c = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (!inKhartoum(c)) { alert("موقعك خارج نطاق ولاية الخرطوم"); render(); return; }
      customLoc = { ...c, label: "موقعي الحالي (GPS) 📍" }; render();
    },
    () => { alert("تعذّر تحديد الموقع — فعّل GPS أو استخدم الطرق الأخرى"); render(); },
    { enableHighAccuracy: true, timeout: 10000 });
}
function applyLoc() {
  const t = $("locin").value;
  const c = parseLocation(t);
  if (!c) { alert("لم أفهم الموقع — الصق الإحداثيات (15.5533, 32.5384) أو رمز Plus Code (HG3Q+89)"); return; }
  if (!inKhartoum(c)) { alert("هذا الموقع خارج نطاق ولاية الخرطوم"); return; }
  customLoc = { ...c, label: "موقع من الخريطة (" + t.trim().slice(0, 20) + ")" };
  render();
}
function toggleSel(id) {
  selected = selected.includes(id) ? selected.filter((x) => x !== id) : (selected.length < 3 ? [...selected, id] : selected);
  render();
}
function handlePhoto(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 600, scale = Math.min(1, max / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      photo = cv.toDataURL("image/jpeg", 0.6);
      render();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
function viewImg(src) {
  const s = src === "_photo_" ? photo : src;
  $("imgmodal").innerHTML = `<div class="modal" onclick="this.parentNode.innerHTML=''"><img src="${s}"></div>`;
}
function waLink(p) {
  const msg = encodeURIComponent("السلام عليكم، أبحث عن دواء: " + (drug || "...") + (note ? "\nملاحظة: " + note : "") + "\nعنواني: " + (address || area || "...") + "\n(عبر تطبيق مراكو برو Mraco Pro)");
  return "https://wa.me/" + p.wa + "?text=" + msg;
}
async function sendRequest() {
  if (!drug.trim() || !address.trim() || selected.length === 0) { alert("أكمل اسم الدواء والعنوان واختر صيدلية"); return; }
  $("sendbtn").disabled = true;
  try {
    const batch = db.batch();
    selected.forEach((pid) => {
      const ref = db.collection("requests").doc();
      batch.set(ref, {
        pharmacyId: pid, drug: drug.trim(), note: note.trim(), address: address.trim(),
        area: area || (customLoc ? customLoc.label : ""), photo: photo || null, isRx,
        clientName: profile.name, clientPhone: profile.phone,
        status: "pending", date: today(), time: nowTime(),
        created: firebase.firestore.FieldValue.serverTimestamp(),
      });
    });
    await batch.commit();
    selected = []; photo = null; isRx = false; sentToast = true;
    render();
  } catch (e) { alert("تعذّر الإرسال — تحقق من الإنترنت"); $("sendbtn").disabled = false; }
}

// ═══════════════ واجهة الصيدلي ═══════════════
function renderPharm() {
  const v = $("view");
  if (!pharmProfile) {
    v.innerHTML = `
      <div class="card">
        <h2>تسجيل الصيدلية 💊</h2>
        <label>اختر صيدليتك من القائمة</label>
        <select id="claim"><option value="">— ابحث عن صيدليتك —</option>
          ${ALL.map((p) => `<option value="${p.id}">${esc(p.name)}${p.area ? " — " + esc(p.area) : ""}</option>`).join("")}
        </select>
        <label>اسم المسؤول</label><input id="pn" placeholder="اسم الصيدلي / المالك">
        <label>رقم الهاتف (للتحقق)</label><input id="pp" placeholder="09XXXXXXXX" inputmode="tel">
        <button class="btn" onclick="claimPharm()">هذه صيدليتي — تسجيل</button>
        <div class="hint">صيدليتك غير موجودة؟ <button class="link-a" onclick="renderJoin()">قدّم طلب انضمام</button></div>
      </div>`;
    return;
  }
  const me = ALL.find((p) => p.id === pharmProfile.pharmacyId);
  v.innerHTML = `
    <div class="card">
      <h2>📊 لوحة ${esc(me ? me.name : "")}</h2>
      <div class="stats" id="pstats"></div>
      <button class="btn blue" onclick="endShift()">🕐 إنهاء الشفت وحفظ تقرير اليوم</button>
      <div id="shiftlist" style="margin-top:12px"></div>
      <div class="hint"><button class="link-a" onclick="pharmProfile=null;store.set('mraco-pharm',null);go('pharm')">تسجيل خروج</button></div>
    </div>
    <div id="inreqs"><div class="card empty"><div class="big">⏳</div>جارٍ تحميل الطلبات...</div></div>`;
  listenPharm();
  loadShifts();
}

function claimPharm() {
  const id = $("claim").value, n = $("pn").value.trim(), p = $("pp").value.trim();
  if (!id || !n || p.length < 9) { alert("أكمل كل الحقول"); return; }
  pharmProfile = { pharmacyId: id, name: n, phone: p };
  store.set("mraco-pharm", pharmProfile);
  render();
}

function listenPharm() {
  if (unsubPharm) return;
  unsubPharm = db.collection("requests").where("pharmacyId", "==", pharmProfile.pharmacyId)
    .onSnapshot((snap) => {
      incoming = snap.docs.map((d) => ({ rid: d.id, ...d.data() }))
        .sort((a, b) => (b.created?.seconds || 0) - (a.created?.seconds || 0)).slice(0, 40);
      const t = incoming.filter((r) => r.date === today());
      const stats = {
        total: t.length,
        confirmed: t.filter((r) => r.status === "available" || r.status === "delivering").length,
        delivered: t.filter((r) => r.status === "delivering").length,
      };
      const ps = $("pstats");
      if (ps) ps.innerHTML = `
        <div class="stat"><div class="n">${stats.total}</div><div class="l">طلبات اليوم</div></div>
        <div class="stat"><div class="n">${stats.confirmed}</div><div class="l">مؤكدة</div></div>
        <div class="stat"><div class="n">${stats.delivered}</div><div class="l">مبيعات ✓</div></div>
        <div class="stat"><div class="n">${stats.total ? Math.round(stats.confirmed/stats.total*100) : 0}%</div><div class="l">نسبة التوفر</div></div>`;
      const el = $("inreqs");
      if (!el) return;
      el.innerHTML = incoming.length === 0
        ? `<div class="card empty"><div class="big">📭</div>لا توجد طلبات واردة بعد.</div>`
        : incoming.map((r) => {
          const s = STATUS[r.status] || STATUS.pending;
          return `<div class="card req">
            <div class="top"><div><div class="drug">💊 ${esc(r.drug)}</div>
            ${r.note ? `<div class="meta">ملاحظة: ${esc(r.note)}</div>` : ""}</div>
            <span class="badge" style="color:${s.color};background:${s.bg}">${s.label}</span></div>
            <div class="meta">👤 ${esc(r.clientName || "عميل")} — ${esc(r.clientPhone || "")}</div>
            <div class="meta">📍 العنوان: ${esc(r.address)} (${esc(r.area)})</div>
            ${r.isRx ? `<span class="badge rx">🩺 روشتة / تأمين مرفقة</span>` : ""}
            ${r.photo ? `<img class="thumb big" src="${r.photo}" onclick="viewImg('${r.photo.length > 50 ? "" : ""}');viewImgSrc('${r.rid}')">` : ""}
            <div class="time">وصل ${esc(r.date)} الساعة ${esc(r.time)}</div>
            ${r.status === "pending" ? `<div class="acts">
              <button class="ok" onclick="setStatus('${r.rid}','available')">✓ متوفر عندنا</button>
              <button class="no" onclick="setStatus('${r.rid}','unavailable')">غير متوفر</button></div>` : ""}
            ${r.status === "available" ? `<div class="acts">
              <button class="go" onclick="setStatus('${r.rid}','delivering')">🛵 تم إرسال الطلب للتوصيل</button></div>` : ""}
          </div>`;
        }).join("");
    }, (e) => {
      const el = $("inreqs");
      if (el) el.innerHTML = `<div class="offline">⚠️ تعذّر تحميل الطلبات — تحقق من الإنترنت</div>`;
    });
}
function viewImgSrc(rid) {
  const r = incoming.find((x) => x.rid === rid);
  if (r && r.photo) viewImg(r.photo);
}
async function setStatus(rid, status) {
  try { await db.collection("requests").doc(rid).update({ status }); }
  catch (e) { alert("تعذّر التحديث — تحقق من الإنترنت"); }
}
async function endShift() {
  const t = incoming.filter((r) => r.date === today());
  try {
    await db.collection("shifts").add({
      pharmacyId: pharmProfile.pharmacyId, date: today(), time: nowTime(),
      total: t.length,
      confirmed: t.filter((r) => r.status === "available" || r.status === "delivering").length,
      delivered: t.filter((r) => r.status === "delivering").length,
      created: firebase.firestore.FieldValue.serverTimestamp(),
    });
    alert("تم حفظ تقرير الشفت ✓");
    loadShifts();
  } catch (e) { alert("تعذّر الحفظ"); }
}
async function loadShifts() {
  try {
    const snap = await db.collection("shifts").where("pharmacyId", "==", pharmProfile.pharmacyId).get();
    const list = snap.docs.map((d) => d.data()).sort((a, b) => (b.created?.seconds || 0) - (a.created?.seconds || 0)).slice(0, 7);
    const el = $("shiftlist");
    if (el && list.length) el.innerHTML = `<label>تقارير الشفتات السابقة</label>` +
      list.map((s) => `<div class="shift"><span>${esc(s.date)} — ${esc(s.time)}</span><span><b>${s.delivered}</b> مبيعات من <b>${s.total}</b> طلبات</span></div>`).join("");
  } catch (e) {}
}

// ═══════════════ طلب انضمام صيدلية ═══════════════
function renderJoin() {
  $("view").innerHTML = `
    <div class="card">
      <h2>طلب انضمام صيدلية جديدة</h2>
      <label>اسم الصيدلية</label><input id="jn" placeholder="بدون كلمة صيدلية">
      <label>رقم الهاتف</label><input id="jp" placeholder="09XXXXXXXX" inputmode="tel">
      <label>الحي / المنطقة</label><input id="ja" placeholder="مثال: بحري - الحلفايا">
      <label>رابط الموقع من خرائط قوقل (اختياري)</label><input id="jl" placeholder="https://maps.app.goo.gl/...">
      <button class="btn" onclick="submitJoin()">إرسال طلب الانضمام</button>
      <div class="hint"><button class="link-a" onclick="go('pharm')">→ رجوع للتسجيل</button></div>
    </div>`;
}
async function submitJoin() {
  const n = $("jn").value.trim(), p = $("jp").value.trim();
  if (!n || p.length < 9) { alert("أكمل الاسم ورقم الهاتف"); return; }
  try {
    await db.collection("applications").add({
      name: n, phone: p, area: $("ja").value.trim(), link: $("jl").value.trim(),
      status: "pending", date: today(),
      created: firebase.firestore.FieldValue.serverTimestamp(),
    });
    alert("✓ تم إرسال طلبك! ستتم مراجعته والتواصل معك.");
    go("pharm");
  } catch (e) { alert("تعذّر الإرسال — تحقق من الإنترنت"); }
}

// ═══════════════ لوحة الإدارة ═══════════════
function renderAdmin() {
  const v = $("view");
  if (!adminOk) {
    v.innerHTML = `
      <div class="card"><h2>🔐 دخول الإدارة</h2>
        <label>الرقم السري</label>
        <input id="pinin" type="password" placeholder="••••" inputmode="numeric">
        <button class="btn" onclick="tryPin()">دخول</button></div>`;
    return;
  }
  v.innerHTML = `<div class="card empty"><div class="big">⏳</div>جارٍ تحميل البيانات...</div>`;
  loadAdmin();
}
function tryPin() {
  const saved = store.get("mraco-pin", "2389");
  if ($("pinin").value === saved) { adminOk = true; render(); }
  else alert("رقم سري خاطئ");
}
async function loadAdmin() {
  try {
    const [rs, as] = await Promise.all([
      db.collection("requests").get(),
      db.collection("applications").get(),
    ]);
    allReqs = rs.docs.map((d) => d.data());
    apps = as.docs.map((d) => ({ aid: d.id, ...d.data() }));
  } catch (e) { $("view").innerHTML = `<div class="offline">⚠️ تعذّر تحميل البيانات</div>`; return; }

  const todayR = allReqs.filter((r) => r.date === today());
  const act = {};
  allReqs.forEach((r) => { act[r.pharmacyId] = (act[r.pharmacyId] || 0) + 1; });
  const top = Object.entries(act).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const pending = apps.filter((a) => a.status === "pending");
  const seeded = ALL.length > 0 && ALL !== SEED_PHARMACIES && ALL[0] && true;

  $("view").innerHTML = `
    <div class="card">
      <h2>📈 نشاط التطبيق (كل المستخدمين)</h2>
      <div class="stats">
        <div class="stat"><div class="n">${todayR.length}</div><div class="l">طلبات اليوم</div></div>
        <div class="stat"><div class="n">${allReqs.length}</div><div class="l">إجمالي الطلبات</div></div>
        <div class="stat"><div class="n">${ALL.length}</div><div class="l">الصيدليات</div></div>
        <div class="stat"><div class="n">${pending.length}</div><div class="l">طلبات انضمام</div></div>
      </div>
      ${top.length ? `<label>أنشط الصيدليات (بعدد الطلبات)</label>` +
        top.map(([pid, n]) => { const p = ALL.find((x) => x.id === pid);
          return `<div class="shift"><span>${esc(p ? p.name : pid)}</span><b>${n} طلب</b></div>`; }).join("") : ""}
    </div>

    <div class="card">
      <h2>☁️ قاعدة البيانات</h2>
      <button class="btn" onclick="seedPharmacies()">⬆️ رفع قاعدة الصيدليات (${SEED_PHARMACIES.length}) للسحابة</button>
      <button class="btn blue" style="margin-top:8px" onclick="testWrite()">🔬 اختبار الاتصال والكتابة</button>
      <div class="hint">اضغطه مرة واحدة فقط بعد إنشاء المشروع — يرفع كل صيدلياتك لقاعدة البيانات</div>
    </div>

    <div class="card">
      <h2>🏪 طلبات انضمام الصيدليات</h2>
      ${apps.length === 0 ? `<div class="empty">لا توجد طلبات انضمام بعد.</div>` :
        apps.map((a) => `
          <div class="card req" style="margin-bottom:9px">
            <div class="top"><div><div class="drug">صيدلية ${esc(a.name)}</div>
            <div class="meta">📞 ${esc(a.phone)} — 📍 ${esc(a.area || "غير محدد")}</div></div>
            <span class="badge" style="${a.status === "approved" ? "color:#0E7A5F;background:#E3F3EC" : a.status === "rejected" ? "color:#A33A3A;background:#FBE9E9" : "color:#B96A00;background:#FDF1DE"}">
              ${a.status === "approved" ? "مقبولة ✓" : a.status === "rejected" ? "مرفوضة" : "قيد المراجعة"}</span></div>
            ${a.status === "pending" ? `<div class="acts">
              <button class="ok" onclick="decideApp('${a.aid}',true)">✓ قبول وإضافة</button>
              <button class="no" onclick="decideApp('${a.aid}',false)">رفض</button></div>` : ""}
          </div>`).join("")}
    </div>

    <div class="card">
      <h2>🛡️ الأمن — حماية بياناتك</h2>
      <div class="sec-item"><span>✅</span><span><b>الأرقام مخفية:</b> لا تظهر في الواجهة — تواصل بالأزرار فقط.</span></div>
      <div class="sec-item"><span>✅</span><span><b>تسجيل إجباري</b> قبل أي استخدام.</span></div>
      <div class="sec-item"><span>⚠️</span><span><b>مهم:</b> قاعدة البيانات في وضع تجريبي مفتوح لمدة 30 يوماً — اطلب مني قواعد الأمان النهائية قبل انتهائها.</span></div>
      <label style="margin-top:12px">تغيير الرقم السري للإدارة (لهذا الجهاز)</label>
      <input id="npin" type="password" placeholder="رقم سري جديد">
      <button class="btn" onclick="changePin()">حفظ الرقم الجديد</button>
      <div class="hint"><button class="link-a" onclick="adminOk=false;go('client')">خروج من الإدارة</button></div>
    </div>`;
}
function changePin() {
  const np = $("npin").value;
  if (np.length < 4) { alert("الرقم قصير — 4 خانات على الأقل"); return; }
  store.set("mraco-pin", np);
  alert("تم تغيير الرقم السري ✓");
}
async function seedPharmacies() {
  if (!confirm("رفع " + SEED_PHARMACIES.length + " صيدلية لقاعدة البيانات السحابية؟")) return;
  const btn = document.querySelector(".btn[onclick='seedPharmacies()']");
  let ok = 0, failMsg = "";
  for (let i = 0; i < SEED_PHARMACIES.length; i++) {
    const p = SEED_PHARMACIES[i];
    if (btn) btn.textContent = "⏳ جارٍ الرفع... " + (i + 1) + " / " + SEED_PHARMACIES.length;
    try {
      const { id, ...data } = p;
      await withTimeout(db.collection("pharmacies").doc(id).set(data), 25000);
      ok++;
    } catch (e) {
      failMsg = (e && e.code ? e.code : "") + " — " + (e && e.message ? e.message : String(e));
      break;
    }
  }
  if (btn) btn.textContent = "⬆️ رفع قاعدة الصيدليات (" + SEED_PHARMACIES.length + ") للسحابة";
  if (ok === SEED_PHARMACIES.length) {
    alert("✓ تم رفع كل الصيدليات بنجاح! (" + ok + " صيدلية)");
    await loadPharmacies();
  } else {
    alert("نجح رفع " + ok + " وتوقف عند خطأ:\n" + failMsg + "\n\nصوّر هذه الرسالة وأرسلها لكلود.");
  }
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error("timeout: العملية تجاوزت " + (ms/1000) + " ثانية — الشبكة تحجب قناة الكتابة")), ms)),
  ]);
}
async function testWrite() {
  try {
    await withTimeout(db.collection("diagnostics").doc("test").set({ t: Date.now() }), 20000);
    alert("✓ اختبار الكتابة نجح! قاعدة البيانات تعمل بشكل كامل.");
  } catch (e) {
    alert("✗ اختبار الكتابة فشل:\n" + (e.code || "") + " — " + (e.message || e) + "\n\nصوّر هذه الرسالة وأرسلها لكلود.");
  }
}
async function decideApp(aid, ok) {
  try {
    await db.collection("applications").doc(aid).update({ status: ok ? "approved" : "rejected" });
    if (ok) {
      const a = apps.find((x) => x.aid === aid);
      await db.collection("pharmacies").add({
        name: "صيدلية " + a.name, phone: a.phone,
        wa: a.phone.length === 10 && a.phone.startsWith("0") ? "249" + a.phone.slice(1) : "",
        lat: null, lng: null, area: a.area || "", map: a.link || "",
      });
      await loadPharmacies();
    }
    renderAdmin(); loadAdmin();
  } catch (e) { alert("تعذّر التنفيذ"); }
}

// ═══════════════ التشغيل ═══════════════
loadPharmacies();
</script>
